<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>LL Content Studio Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060606;--card:#0B0B0B;--brd:#151515;--org:#FF6B00;--pur:#A855F7;--txt:#E8E8E8;--dim:#AAA;--inp:#0E0E0E;--ibrd:#1A1A1A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
textarea::placeholder{color:#3A3A3A!important}
textarea:focus{outline:none;border-color:var(--org)!important;box-shadow:0 0 0 2px rgba(255,107,0,.1)}
button{font-family:'Outfit',sans-serif;cursor:pointer}

.header{position:sticky;top:0;z-index:10;border-bottom:1px solid #121212;background:rgba(6,6,6,.92);backdrop-filter:blur(16px)}
.header-in{max-width:1280px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.logo-r{display:flex;align-items:center;gap:10px}
.logo-i{width:38px;height:38px;border-radius:10px;background:#111;display:flex;align-items:center;justify-content:center;border:1px solid #1A1A1A;flex-shrink:0}
.ttl{font-size:17px;font-weight:800;background:linear-gradient(90deg,#FF6B00,#A855F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:9px;color:#4A4A4A}
.sub span{color:var(--pur)}
.hdr-r{display:flex;align-items:center;gap:6px}
.hbadge{font-size:8px;font-weight:600;padding:3px 7px;border-radius:5px;border:1px solid}

.main{max-width:1280px;margin:0 auto;padding:16px 16px 0;display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.main{grid-template-columns:1fr}}
.left{display:flex;flex-direction:column;gap:10px}
.right{position:sticky;top:64px}
@media(max-width:860px){.right{position:static}}

.card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 16px;animation:fadeIn .3s ease}
.ch{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.ci{font-size:12px}.ct{font-size:9px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.05em}
.badge{font-size:7px;font-weight:600;color:var(--pur);margin-left:auto;background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.12);padding:2px 6px;border-radius:3px;text-transform:uppercase}
textarea{width:100%;background:var(--inp);border:1px solid var(--ibrd);border-radius:9px;color:var(--txt);font-size:13px;font-family:'Outfit',sans-serif;padding:10px 12px;resize:vertical;line-height:1.5}

.pr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:4px}
.pb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;background:var(--inp);border:1px solid #1E1E1E;border-radius:8px;color:#777;transition:all .15s;position:relative;font-size:10px;font-weight:600}
.pb.act{color:var(--txt);box-shadow:0 0 0 2px rgba(255,107,0,.1)}
.pb .ck{position:absolute;top:3px;right:5px;font-size:8px;display:none}
.pb.act .ck{display:block}

.eb{width:100%;background:none;border:none;font-size:10px;font-weight:500;color:#555;padding:3px 0;text-align:left}

.fmt-r{display:flex;gap:5px}
.fmt{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;background:var(--inp);border:1px solid var(--ibrd);border-radius:8px;color:#777;font-size:10px;font-weight:600}
.fmt.act{border-color:var(--org);background:rgba(255,107,0,.03);color:var(--txt);box-shadow:0 0 0 2px rgba(255,107,0,.06)}
.fmt .ic{font-size:18px}

.up{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px;border:2px dashed var(--ibrd);border-radius:9px;cursor:pointer;background:#080808;font-size:11px;font-weight:600;color:#555}
.up input{display:none}
.ft{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(255,107,0,.03);border:1px solid rgba(255,107,0,.12);border-radius:8px;font-size:11px;color:#CCC}
.rb{width:22px;height:22px;border-radius:5px;border:1px solid #252525;background:transparent;color:#555;font-size:10px;display:flex;align-items:center;justify-content:center}

.ig{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:5px}
.it{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--ibrd);aspect-ratio:1}
.it img{width:100%;height:100%;object-fit:cover;display:block}
.it .x{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:4px;background:rgba(0,0,0,.7);border:1px solid #333;color:#999;font-size:8px;display:flex;align-items:center;justify-content:center}

.gen{width:100%;padding:14px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FF6B00,#CC5500);border:none;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 24px rgba(255,107,0,.18)}
.gen:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.err{padding:10px 12px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);border-radius:9px;color:#EF4444;font-size:11px;display:none;align-items:flex-start;gap:6px;word-break:break-word;line-height:1.4}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;padding:32px;background:var(--card);border:1px solid #131313;border-radius:14px}
.empty h3{font-size:16px;color:#333}
.empty p{font-size:11px;color:#2A2A2A;max-width:260px;line-height:1.5;margin-top:6px}
.empty strong{color:var(--org)}

.out{background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden;animation:fadeIn .4s ease;display:none}
.out-h{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #131313;background:#090909;flex-wrap:wrap;gap:6px}
.out-t{font-size:12px;font-weight:700;color:#DDD}
.out-a{display:flex;gap:4px}
.out-a button{padding:5px 10px;font-size:12px;border-radius:6px;border:1px solid}
.btn-cp{color:var(--pur);background:rgba(168,85,247,.05);border-color:rgba(168,85,247,.12)}
.btn-ex{color:var(--org);background:rgba(255,107,0,.06);border-color:rgba(255,107,0,.15);font-weight:700}
.out-c{padding:16px 18px;line-height:1.7;font-size:12px;max-height:50vh;overflow-y:auto}
.out-f{padding:8px 14px;border-top:1px solid #131313;font-size:9px;color:#333;text-align:right}

/* Markdown */
.md h1{font-size:16px;font-weight:700;color:var(--org);margin:14px 0 6px}
.md h2{font-size:14px;font-weight:700;color:var(--pur);margin:12px 0 5px}
.md h3{font-size:12px;font-weight:600;color:var(--org);margin:10px 0 4px}
.md p{margin:2px 0;color:var(--dim);line-height:1.6}
.md strong{color:var(--org)}
.md .li{display:flex;gap:6px;margin:2px 0;padding-left:4px;color:var(--dim)}
.md .bul{color:var(--org);flex-shrink:0}
.md hr{border:none;border-top:1px solid var(--ibrd);margin:10px 0}

/* Image generation section */
.img-sec{margin-top:12px;padding:14px;background:#0D0D0D;border:1px solid #181818;border-radius:12px;display:none}
.img-sec h4{font-size:11px;font-weight:700;color:var(--pur);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.prompt-list{display:flex;flex-direction:column;gap:6px}
.prompt-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--inp);border:1px solid var(--ibrd);border-radius:8px}
.prompt-item .txt{flex:1;font-size:10px;color:#888;line-height:1.4;max-height:40px;overflow:hidden}
.prompt-item .gbtn{padding:6px 14px;font-size:10px;font-weight:700;color:#fff;background:linear-gradient(135deg,#A855F7,#7C3AED);border:none;border-radius:6px;white-space:nowrap;flex-shrink:0}
.prompt-item .gbtn:disabled{opacity:.5;cursor:wait}
.prompt-item .gbtn.done{background:#22C55E}

/* Generated images */
.gen-imgs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.gen-img{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--ibrd);background:#111}
.gen-img img{width:100%;display:block;border-radius:10px}
.gen-img .dl{position:absolute;bottom:6px;right:6px;padding:5px 12px;font-size:10px;font-weight:700;color:#fff;background:rgba(255,107,0,.9);border:none;border-radius:6px;text-decoration:none}
.gen-img .shimmer{width:100%;aspect-ratio:4/5;background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

.footer{max-width:1280px;margin:0 auto;padding:24px 16px 14px;text-align:center}
.footer-l{height:1px;background:linear-gradient(90deg,transparent,#151515,transparent);margin-bottom:10px}
.footer p{font-size:8px;color:#222}
</style>
</head>
<body>

<header class="header">
  <div class="header-in">
    <div class="logo-r">
      <div class="logo-i"><svg width="24" height="24" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#FF6B00" stroke-width="2"/><path d="M9 18V10h2v6h4v2H9z" fill="#FF6B00"/><path d="M15 18V10h2v6h2v2h-4z" fill="#A855F7"/></svg></div>
      <div><div class="ttl">LL Content Studio <span style="font-size:10px;color:#A855F7">PRO</span></div><div class="sub">by <span>Catarina</span> — Marketing</div></div>
    </div>
    <div class="hdr-r">
      <span id="brandBadge" class="hbadge" style="color:#FF6B00;border-color:rgba(255,107,0,.3)">🏋️ LL Squad</span>
    </div>
  </div>
</header>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <!-- Tema -->
    <div class="card">
      <div class="ch"><span class="ci">✏️</span><span class="ct">Tema</span></div>
      <textarea id="tema" placeholder="Ex: 5 erros que impedem seu shape de evoluir..." rows="3"></textarea>
    </div>

    <!-- Marca -->
    <div class="card" id="brandCard">
      <div class="ch"><span class="ci">🎨</span><span class="ct">Marca</span></div>
      <div class="pr" id="presets"></div>
      <button class="eb" id="editBrandBtn" onclick="toggleBrandEdit()">▸ Editar</button>
      <div id="brandEdit" style="display:none;margin-top:6px">
        <textarea id="brandText" rows="5" style="font-size:11px;line-height:1.4"></textarea>
      </div>
    </div>

    <!-- Refs visuais -->
    <div class="card" id="refsCard">
      <div class="ch"><span class="ci">📷</span><span class="ct">Referências</span><span class="badge">Opcional</span></div>
      <div class="ig" id="refsGrid"></div>
      <label class="up" id="refsUp"><input type="file" id="refsInput" accept="image/*" multiple onchange="onRefImgs(this)"><span>🖼️ Adicionar (0/4)</span></label>
    </div>

    <!-- Formato -->
    <div class="card">
      <div class="ch"><span class="ci">🎯</span><span class="ct">Formato</span></div>
      <div class="fmt-r" id="formats"></div>
    </div>

    <!-- Gerar -->
    <button class="gen" id="genBtn" onclick="generate()" disabled>⚡ Gerar conteúdo</button>
    <div class="err" id="errBox"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="empty" id="emptyState">
      <h3>⚡ Pronto pra criar</h3>
      <p>Escolha marca, tema e clique <strong>Gerar conteúdo</strong></p>
    </div>

    <div class="empty" id="loadState" style="display:none">
      <div class="spin" style="width:32px;height:32px;border-width:3px"></div>
      <h3 id="loadMsg" style="margin-top:16px;color:#555"></h3>
    </div>

    <div class="out" id="outCard">
      <div class="out-h">
        <span class="out-t" id="outTitle"></span>
        <div class="out-a">
          <button class="btn-cp" onclick="copyResult()">📋</button>
          <button class="btn-ex" onclick="exportImg()">📥</button>
        </div>
      </div>
      <div class="out-c md" id="outContent"></div>

      <!-- Image generation section -->
      <div class="img-sec" id="imgSec">
        <h4>🎨 Gerar Imagens (Nano Banana 2)</h4>
        <div class="prompt-list" id="promptList"></div>
        <div class="gen-imgs" id="genImgs"></div>
      </div>

      <div class="out-f">Catarina • LL Content Studio Pro</div>
    </div>
  </div>
</div>

<footer class="footer"><div class="footer-l"></div><p>LL Squad © 2026 • Inove Fit Pelinca</p></footer>

<script>
// ─── STATE ───
const BRANDS = [
  {id:"llsquad",name:"LL Squad",icon:"🏋️",color:"#FF6B00",
   text:"Marca: LL Squad — Personal Trainers\n@llsquad.fit | Inove Fit, Pelinca, Campos/RJ\nCores: Preto #0A0A0A, Laranja #FF6B00, Roxo neon #A855F7, Branco #E8E8E8\nTom: Motivacional, direto, linguagem fitness\nPúblico: Homens e mulheres 20-45, musculação\nEstilo: Dark/tech, iluminação dramática, tipografia bold\nSlogan: Seu shape, nosso método"},
  {id:"melliz",name:"Melliz Arq.",icon:"🏛️",color:"#8B7355",
   text:"Marca: Melliz Arquitetura\n@melliz.arquitetura | \"Seu espaço encanta?\"\nCores: Off-white #FAF8F5, Verde oliva #5C6B4F, Bege #C4A882, Grafite #2C2C2C, Dourado #B8976A\nTom: Sofisticado, clean, inspiracional\nPúblico: Mulheres/casais 25-45, construindo/reformando\nEstilo: Minimalista, luz natural, tons neutros"},
  {id:"custom",name:"Outra",icon:"✨",color:"#888",text:""}
];
const FMTS = [
  {id:"post",label:"Post",icon:"📸"},
  {id:"carrossel",label:"Carrossel",icon:"🎠"},
  {id:"reels",label:"Reels",icon:"🎬"}
];
const LMSGS = ["Catarina pensando","Analisando tendências","Criando copy","Montando conteúdo"];

let brand = "llsquad", brandTxt = BRANDS[0].text, fmt = "post";
let refImgs = [], rawResult = "", imgPrompts = [];
let showBrandEdit = false;

// ─── INIT ───
function init() {
  // Presets
  const pr = document.getElementById("presets");
  BRANDS.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "pb" + (b.id === brand ? " act" : "");
    btn.style.cssText = b.id === brand ? `border-color:${b.color};background:${b.color}0D` : "";
    btn.dataset.id = b.id;
    btn.innerHTML = `<span style="font-size:15px">${b.icon}</span>${b.name}<span class="ck" style="color:${b.color}">✓</span>`;
    btn.onclick = () => pickBrand(b.id);
    pr.appendChild(btn);
  });
  document.getElementById("brandText").value = brandTxt;

  // Formats
  const fr = document.getElementById("formats");
  FMTS.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "fmt" + (f.id === fmt ? " act" : "");
    btn.dataset.id = f.id;
    btn.innerHTML = `<span class="ic">${f.icon}</span>${f.label}`;
    btn.onclick = () => pickFmt(f.id);
    fr.appendChild(btn);
  });

  document.getElementById("tema").addEventListener("input", checkReady);
}

function pickBrand(id) {
  brand = id;
  const b = BRANDS.find(x => x.id === id);
  brandTxt = b.text;
  document.getElementById("brandText").value = brandTxt;
  document.querySelectorAll(".pb").forEach(el => {
    const isAct = el.dataset.id === id;
    el.className = "pb" + (isAct ? " act" : "");
    const br = BRANDS.find(x => x.id === el.dataset.id);
    el.style.cssText = isAct ? `border-color:${br.color};background:${br.color}0D` : "";
  });
  showBrandEdit = id === "custom";
  document.getElementById("brandEdit").style.display = showBrandEdit ? "block" : "none";
  document.getElementById("editBrandBtn").style.display = id === "custom" ? "none" : "block";
  document.getElementById("editBrandBtn").textContent = "▸ Editar";
  // Update badge
  document.getElementById("brandBadge").innerHTML = `${b.icon} ${b.name}`;
  document.getElementById("brandBadge").style.color = b.color;
  document.getElementById("brandBadge").style.borderColor = b.color + "44";
  document.getElementById("brandCard").style.borderColor = b.color + "33";
}

function toggleBrandEdit() {
  showBrandEdit = !showBrandEdit;
  document.getElementById("brandEdit").style.display = showBrandEdit ? "block" : "none";
  document.getElementById("editBrandBtn").textContent = showBrandEdit ? "▾ Ocultar" : "▸ Editar";
  document.getElementById("editBrandBtn").style.color = showBrandEdit ? "#FF6B00" : "#555";
}

function pickFmt(id) {
  fmt = id;
  document.querySelectorAll(".fmt").forEach(el => {
    el.className = "fmt" + (el.dataset.id === id ? " act" : "");
  });
}

// ─── REF IMAGES ───
function onRefImgs(input) {
  const files = Array.from(input.files || []);
  if (refImgs.length + files.length > 4) { showErr("Máximo 4 imagens"); return; }
  files.forEach(f => {
    if (!f.type.startsWith("image/") || f.size > 5*1024*1024) return;
    const r = new FileReader();
    r.onload = () => { refImgs.push({prev:r.result}); renderRefs(); };
    r.readAsDataURL(f);
  });
}
function renderRefs() {
  const g = document.getElementById("refsGrid");
  g.innerHTML = "";
  refImgs.forEach((img, i) => {
    g.innerHTML += `<div class="it"><img src="${img.prev}"><button class="x" onclick="rmRef(${i})">✕</button></div>`;
  });
  document.querySelector("#refsUp span").textContent = `🖼️ Adicionar (${refImgs.length}/4)`;
  document.getElementById("refsUp").style.display = refImgs.length >= 4 ? "none" : "flex";
  document.getElementById("refsCard").style.borderColor = refImgs.length > 0 ? "rgba(168,85,247,.25)" : "#151515";
}
function rmRef(i) { refImgs.splice(i, 1); renderRefs(); }

function checkReady() {
  document.getElementById("genBtn").disabled = !document.getElementById("tema").value.trim();
}

function showErr(msg) { const e = document.getElementById("errBox"); e.innerHTML = "⚠️ " + msg; e.style.display = "flex"; }
function hideErr() { document.getElementById("errBox").style.display = "none"; }

// ─── MARKDOWN ───
function md(text) {
  // Remove IMG_PROMPT tags from display
  text = text.replace(/\[IMG_PROMPT\]/g, '**Prompt de imagem:**\n').replace(/\[\/IMG_PROMPT\]/g, '');
  return text.split("\n").map(l => {
    if (l.startsWith("### ")) return `<h3>${l.slice(4)}</h3>`;
    if (l.startsWith("## ")) return `<h2>${l.slice(3)}</h2>`;
    if (l.startsWith("# ")) return `<h1>${l.slice(2)}</h1>`;
    if (l.startsWith("**") && l.endsWith("**")) return `<p style="font-weight:600;color:#E8E8E8">${l.replace(/\*\*/g,"")}</p>`;
    if (l.startsWith("- ")||l.startsWith("* ")) return `<div class="li"><span class="bul">▸</span><span>${ib(l.slice(2))}</span></div>`;
    if (l.startsWith("---")) return "<hr>";
    if (!l.trim()) return '<div style="height:6px"></div>';
    return `<p>${ib(l)}</p>`;
  }).join("");
}
function ib(t) { return t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>'); }

// ─── GENERATE CONTENT ───
async function generate() {
  const tema = document.getElementById("tema").value.trim();
  if (!tema) return;

  hideErr();
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("outCard").style.display = "none";
  document.getElementById("loadState").style.display = "flex";

  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Gerando...';

  // Loading animation
  let mi = 0, dots = "";
  const lv = setInterval(() => { mi = (mi+1) % LMSGS.length; }, 2200);
  const dv = setInterval(() => {
    dots = dots.length >= 3 ? "" : dots + ".";
    document.getElementById("loadMsg").textContent = LMSGS[mi] + dots;
  }, 400);

  const btxt = document.getElementById("brandText").value || brandTxt;
  const fl = FMTS.find(f => f.id === fmt)?.label || "Post";

  try {
    const resp = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ tema, formato: fl, brand_text: btxt })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    rawResult = data.text;
    imgPrompts = data.image_prompts || [];

    // Show result
    document.getElementById("loadState").style.display = "none";
    const bName = BRANDS.find(b => b.id === brand)?.name || "";
    document.getElementById("outTitle").textContent = `${FMTS.find(f=>f.id===fmt)?.icon} ${fl} • ${bName}`;
    document.getElementById("outContent").innerHTML = md(rawResult);
    document.getElementById("outCard").style.display = "block";

    // Show image prompts
    if (imgPrompts.length > 0) {
      document.getElementById("imgSec").style.display = "block";
      const pl = document.getElementById("promptList");
      pl.innerHTML = "";
      document.getElementById("genImgs").innerHTML = "";
      imgPrompts.forEach((p, i) => {
        const short = p.length > 80 ? p.slice(0, 80) + "..." : p;
        pl.innerHTML += `<div class="prompt-item" id="pi${i}"><span class="txt">${short}</span><button class="gbtn" id="gb${i}" onclick="genImage(${i})">🎨 Gerar</button></div>`;
      });
    } else {
      document.getElementById("imgSec").style.display = "none";
    }

  } catch (err) {
    document.getElementById("loadState").style.display = "none";
    document.getElementById("emptyState").style.display = "flex";
    showErr(err.message);
  } finally {
    clearInterval(lv); clearInterval(dv);
    btn.innerHTML = "⚡ Gerar conteúdo";
    checkReady();
  }
}

// ─── GENERATE IMAGE ───
async function genImage(idx) {
  const btn = document.getElementById("gb" + idx);
  btn.disabled = true;
  btn.textContent = "⏳ Gerando...";

  // Add shimmer placeholder
  const container = document.getElementById("genImgs");
  const placeholder = document.createElement("div");
  placeholder.className = "gen-img";
  placeholder.id = "gimg" + idx;
  placeholder.innerHTML = '<div class="shimmer"></div>';
  container.appendChild(placeholder);

  try {
    const resp = await fetch("/api/image", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt: imgPrompts[idx] })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const mime = data.mime || "image/png";
    const src = `data:${mime};base64,${data.image}`;

    placeholder.innerHTML = `<img src="${src}"><a class="dl" href="${src}" download="llcontent_img_${idx+1}.png">📥 Baixar</a>`;
    btn.textContent = "✅ Pronto";
    btn.className = "gbtn done";

  } catch (err) {
    placeholder.innerHTML = `<div style="padding:20px;text-align:center;color:#EF4444;font-size:11px">❌ ${err.message}</div>`;
    btn.textContent = "🔄 Tentar";
    btn.disabled = false;
  }
}

// ─── COPY ───
function copyResult() {
  navigator.clipboard.writeText(rawResult.replace(/\[IMG_PROMPT\]/g,"").replace(/\[\/IMG_PROMPT\]/g,""));
  const btn = document.querySelector(".btn-cp");
  btn.textContent = "✅";
  setTimeout(() => btn.textContent = "📋", 2000);
}

// ─── CANVAS EXPORT ───
function exportImg() {
  const text = rawResult.replace(/\[IMG_PROMPT\]/g,"").replace(/\[\/IMG_PROMPT\]/g,"");
  const fl = FMTS.find(f=>f.id===fmt)?.label||"Post";
  const bn = BRANDS.find(b=>b.id===brand)?.name||"";
  const now = new Date();
  const ds = now.toLocaleDateString("pt-BR")+" "+now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  const blocks = text.split("\n").map(l=>{
    if(l.startsWith("### "))return{t:"h3",x:l.slice(4)};if(l.startsWith("## "))return{t:"h2",x:l.slice(3)};
    if(l.startsWith("# "))return{t:"h1",x:l.slice(2)};if(l.startsWith("---"))return{t:"hr",x:""};
    if(l.startsWith("- ")||l.startsWith("* "))return{t:"li",x:l.slice(2).replace(/\*\*/g,"")};
    if(l.startsWith("**")&&l.endsWith("**"))return{t:"b",x:l.replace(/\*\*/g,"")};
    if(!l.trim())return{t:"sp",x:""};return{t:"p",x:l.replace(/\*\*/g,"")};
  });
  const W=800,m=50,sc=2;
  const lh={h1:30,h2:26,h3:22,b:20,p:19,li:19,sp:12,hr:18};
  const cl={h1:48,h2:52,h3:56,b:65,p:72,li:68};
  const co={h1:"#FF6B00",h2:"#A855F7",h3:"#FF6B00",b:"#E0E0E0",p:"#CCC",li:"#CCC"};
  let H=m+100;const pr=[];
  for(const b of blocks){if(b.t==="hr"||b.t==="sp"){pr.push({...b,ls:[]});H+=lh[b.t];continue;}
    const lim=cl[b.t]||72;const lines=[];
    if(b.x.length>lim){const ws=b.x.split(" ");let c="";for(const w of ws){if((c+" "+w).trim().length>lim){lines.push(c.trim());c=w;}else c=(c+" "+w).trim();}if(c)lines.push(c.trim());}else lines.push(b.x);
    pr.push({...b,ls:lines});H+=lines.length*lh[b.t]+4;
  }H+=50+m;
  const cv=document.createElement("canvas");cv.width=W*sc;cv.height=H*sc;
  const c=cv.getContext("2d");c.scale(sc,sc);
  c.fillStyle="#0A0A0A";c.fillRect(0,0,W,H);
  const g=c.createLinearGradient(0,0,0,H);g.addColorStop(0,"#FF6B00");g.addColorStop(1,"#A855F7");c.fillStyle=g;c.fillRect(0,0,5,H);
  c.textBaseline="top";c.fillStyle="#FF6B00";c.font="bold 20px Helvetica,sans-serif";c.fillText("LL Content Studio Pro",m,m);
  c.fillStyle="#666";c.font="11px Helvetica,sans-serif";c.fillText(bn||"by Catarina",m,m+26);
  c.textAlign="right";c.fillStyle="#FF6B00";c.font="bold 9px Helvetica,sans-serif";c.fillText("LL SQUAD",W-m,m+6);
  c.fillStyle="#555";c.font="10px Helvetica,sans-serif";c.fillText(ds,W-m,m+22);c.textAlign="left";
  c.strokeStyle="#FF6B00";c.lineWidth=2;c.beginPath();c.moveTo(m,m+50);c.lineTo(W-m,m+50);c.stroke();
  c.fillStyle="#A855F7";c.font="bold 12px Helvetica,sans-serif";c.fillText("Formato: "+fl,m,m+70);
  const tema=document.getElementById("tema").value.trim();
  if(tema){c.fillStyle="#555";c.font="10px Helvetica,sans-serif";c.fillText("Tema: "+tema,m,m+86);}
  let y=m+100;
  for(const bl of pr){
    if(bl.t==="hr"){c.strokeStyle="#222";c.lineWidth=1;c.beginPath();c.moveTo(m,y+8);c.lineTo(W-m,y+8);c.stroke();y+=lh.hr;continue;}
    if(bl.t==="sp"){y+=lh.sp;continue;}
    const fs={h1:18,h2:15,h3:13,b:12,p:12,li:12};const fw=["h1","h2","h3","b"].includes(bl.t)?"bold ":"";
    c.font=fw+(fs[bl.t]||12)+"px Helvetica,sans-serif";c.fillStyle=co[bl.t]||"#CCC";
    bl.ls.forEach(l=>{if(bl.t==="li"){c.fillStyle="#FF6B00";c.fillText("▸",m,y);c.fillStyle=co.li;c.fillText(l,m+16,y);}else c.fillText(l,m,y);y+=lh[bl.t];});y+=4;
  }
  y=H-50;c.strokeStyle="#1A1A1A";c.lineWidth=1;c.beginPath();c.moveTo(m,y);c.lineTo(W-m,y);c.stroke();
  c.fillStyle="#444";c.font="9px Helvetica,sans-serif";c.fillText("LL Squad © 2026",m,y+18);c.textAlign="right";c.fillText("Catarina — LL Content Studio Pro",W-m,y+18);

  const url = cv.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "LL_Content_" + new Date().toISOString().slice(0,10) + ".png";
  a.click();
}

init();
</script>
